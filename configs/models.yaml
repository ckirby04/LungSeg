# Model Registry Configuration for Lung CT Segmentation
# 4 base models at different patch sizes

ensemble:
  fusion_mode: "stacking"
  default_threshold: 0.5

models:
  - name: "base_8patch"
    path: "model/base_models/base_8patch_best.pth"
    architecture: "lightweight"
    patch_size: 8
    threshold: 0.3
    base_channels: 20
    in_channels: 1
    use_attention: true
    use_residual: true

  - name: "base_12patch"
    path: "model/base_models/base_12patch_best.pth"
    architecture: "lightweight"
    patch_size: 12
    threshold: 0.25
    base_channels: 20
    in_channels: 1
    use_attention: true
    use_residual: true

  - name: "base_24patch"
    path: "model/base_models/base_24patch_best.pth"
    architecture: "lightweight"
    patch_size: 24
    threshold: 0.5
    base_channels: 20
    in_channels: 1
    use_attention: true
    use_residual: true

  - name: "base_36patch"
    path: "model/base_models/base_36patch_best.pth"
    architecture: "lightweight"
    patch_size: 36
    threshold: 0.5
    base_channels: 20
    in_channels: 1
    use_attention: true
    use_residual: true

stacking:
  path: "model/stacking_classifier.pth"
  in_channels: 6
  patch_size: 32
  overlap: 0.5
  threshold: 0.9

inference:
  window_size: [96, 96, 96]
  overlap: 0.75
  use_tta: false
  tta_mode: "minimal"
  postprocessing:
    min_size: 15
    opening_size: 1
    closing_size: 1
